<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where_is_my_girl_friend</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --fg: #111827;
      --card: #ffffff;
      --line: #d1d5db;
      --link: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --fg: #e5e7eb;
        --card: #111827;
        --line: #374151;
        --link: #93c5fd;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      max-width: 680px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px;
      box-sizing: border-box;
    }
    h1 { margin: 0 0 14px; font-size: 1.5rem; }
    p { margin: 0 0 10px; line-height: 1.6; }
    ul { margin: 14px 0 0; padding-left: 20px; }
    li { margin: 8px 0; }
    a { color: var(--link); }
  </style>
</head>
<body>
  <main>
    <h1>Repository Notice</h1>
    <p>기존 메인 페이지에 있던 Flow Editor는 별도 저장소로 이전되었습니다.</p>
    <p>이 저장소는 퍼즐 버전 보관용으로 유지됩니다.</p>
    <ul>
      <li>Flow Editor: <a href="https://whereismygirlfriend.github.io/flow_editor/">https://whereismygirlfriend.github.io/flow_editor/</a></li>
      <li>Puzzle (v0.1.0): <a href="./v0.1.0_puzzle.html">./v0.1.0_puzzle.html</a></li>
    </ul>
  </main>
</body>
</html>
